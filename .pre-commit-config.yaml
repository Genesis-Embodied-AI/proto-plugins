# Hooks run by prek (https://github.com/j178/prek). Run all: `prek run --all-files`
# taplo and typos run through proto so .prototools is the single source of truth for their versions.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml

  - repo: local
    hooks:
      - id: typos
        name: typos
        entry: proto run typos --
        language: system
        pass_filenames: false

      - id: taplo-format
        name: taplo format
        entry: proto run taplo -- format
        language: system
        pass_filenames: false
        files: '(\.toml|\.prototools)$'

      - id: taplo-lint
        name: taplo lint
        entry: proto run taplo -- lint
        language: system
        pass_filenames: false
        files: '(\.toml|\.prototools)$'
