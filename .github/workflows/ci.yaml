name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install toolchain
        uses: moonrepo/setup-toolchain@v0.6
        env:
          PROTO_LOG: debug
        with:
          auto-install: true
          cache: false

      - name: Run hooks
        run: proto run prek -- run --all-files --show-diff-on-failure

  install:
    name: "Install (${{ matrix.target }})"
    runs-on: "${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: windows-2025
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v7

      - name: Install plugins
        uses: moonrepo/setup-toolchain@v0.6
        env:
          PROTO_LOG: debug
        with:
          auto-install: true
          cache: false
